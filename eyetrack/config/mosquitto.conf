# Mosquitto MQTT Broker Configuration
# Used by eyetrack for IoT/edge device communication

# --- Default MQTT listener ---
listener 1883
protocol mqtt
allow_anonymous true

# --- WebSocket listener ---
listener 9001
protocol websockets
allow_anonymous true

# --- Persistence ---
persistence false

# --- Logging ---
log_dest stdout
log_type error
log_type warning
log_type information
